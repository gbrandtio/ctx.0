# Local development database (DATABASE_CODE_FIRST.md): Postgres with
# PostGIS. Apply migrations with:
#   dotnet ef database update --project Infrastructure --startup-project AppApi
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
