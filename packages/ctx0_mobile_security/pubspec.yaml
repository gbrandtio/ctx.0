name: ctx0_mobile_security
description: >-
  The permanent mobile security plane of the ctx.0 platform: RASP,
  hardware-backed device identity, ECDSA request signing, application-layer
  encryption (ALE), token refresh, secure storage, and response caching —
  assembled as a fixed interceptor chain. Consumers configure it through
  CtxSecurityConfig; the chain itself is not modifiable.
version: 0.2.0
repository: https://github.com/brant-io/ctx.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Networking & interceptors
  http: ^1.2.0

  # Persistence (secure tokens/keys + response cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0

  # Cryptography: ECDSA P-256 request signing + hybrid ALE
  pointycastle: ^4.0.0

  # Device identity (UUID v4 device ids)
  uuid: ^4.5.0

  # RASP — part of the permanent security plane; never remove.
  freerasp: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
