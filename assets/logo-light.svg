<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 396 132" width="396" height="132" role="img" aria-label="ctx.0 logo">
  <!-- prompt chevron -->
  <path d="M22 38 L56 66 L22 94" fill="none" stroke="#10B981" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- wordmark -->
  <text x="78" y="94" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="84" font-weight="700" fill="#1F2328" textLength="152" lengthAdjust="spacingAndGlyphs">ctx</text>
  <!-- the dot, as a token block -->
  <rect x="240" y="76" width="18" height="18" rx="4" fill="#10B981"/>
  <text x="268" y="94" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="84" font-weight="700" fill="#1F2328" textLength="51" lengthAdjust="spacingAndGlyphs">0</text>
  <!-- blinking cursor -->
  <rect x="332" y="30" width="13" height="64" rx="2" fill="#10B981">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>
</svg>
