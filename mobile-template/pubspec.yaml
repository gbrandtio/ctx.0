name: app_template
description: "Production app template — configurable shell + plug-n-play feature modules. See AGENTS.md."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (docs/STATE_MANAGEMENT.md)
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7

  # Navigation (docs/APP_SHELL.md)
  go_router: ^16.0.0

  # Networking & interceptors (docs/HTTP_HANDLING.md)
  http: ^1.2.0

  # Persistence (docs/CACHING_IMPLEMENTATION.md, docs/SECURITY.md §2)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0

  # Cryptography: ECDSA P-256 request signing + hybrid ALE (docs/SECURITY.md §1, §4)
  pointycastle: ^4.0.0

  # Device identity (docs/HTTP_HANDLING.md — X-App-Device-Id, UUID v4)
  uuid: ^4.5.0

  # Auth module: Google Sign-In — scaffoldable auth method, managed ONLY
  # by `dart run tool/scaffold.dart` (docs/INTEGRATIONS.md)
  # ctx:auth_google:begin
  google_sign_in: ^7.2.0
  # ctx:auth_google:end

  # Settings module: privacy policy / terms links (docs/APP_SHELL.md §4);
  # scaffoldable with the settings feature (docs/INTEGRATIONS.md)
  # ctx:settings:begin
  url_launcher: ^6.3.0
  # ctx:settings:end

  # Brand SVG assets (docs/UI_UX_GUIDELINES.md §4D)
  flutter_svg: ^2.0.0

  intl: any
  cupertino_icons: ^1.0.8

  # RASP (docs/SECURITY.md §4.1) — part of the permanent security plane,
  # NOT an optional integration; never remove (docs/INTEGRATIONS.md §1).
  freerasp: ^8.0.0

  # Opt-in integrations — managed ONLY by `dart run tool/scaffold.dart`
  # (docs/INTEGRATIONS.md). Never hand-edit the marker blocks below.
  # ctx:push_firebase:begin
  # ctx:off firebase_core: ^4.11.0
  # ctx:off firebase_messaging: ^16.4.1
  # ctx:push_firebase:end
  # ctx:payments_stripe:begin
  # ctx:off flutter_stripe: ^13.0.0
  # ctx:payments_stripe:end
  # ctx:maps_google:begin
  # ctx:off google_maps_flutter: ^2.17.1
  # ctx:off geolocator: ^14.0.2
  # ctx:maps_google:end

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  generate: true # gen-l10n (docs/FLUTTER_LOCALIZATION.md)
  uses-material-design: true

  assets:
    - assets/brand/
